{% extends "base.html" %}

{% endblock %}
{% block content %}

  <p class="mb-5">{{ category.description }}</p>
  {% for post in post_list %}

      {% include "includes/post_card.html" %}
    </article>
  {% endfor %}
{% endblock %}
