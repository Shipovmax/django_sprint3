{% extends "base.html" %}
{% load static %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
  <div class="center-block text-center">
    <h1>Nothing is here</h1>
    <p>This likely happened because of a typo in the address.<br>
      Try going back or return to the <a href="{% url 'blog:index' %}">home page.</a></p>
    <img src="{% static "img/404-image.png" %}" width="300" alt="">
    <b>Error code: 404</b>
  </div>
{% endblock %}
